<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuiz SJAM Tahun 6 (2025)</title>
    <!-- Tailwind CSS untuk gaya moden & responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0ebf8; /* Warna latar belakang seakan Google Forms */
            font-family: 'Google Sans', Roboto, Helvetica, Arial, sans-serif;
        }
        .question-card {
            background-color: white;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            border: 1px solid #dadce0;
        }
        .header-card {
            border-top: 10px solid #673ab7; /* Tema warna Indigo/Purple Google Forms */
        }
        .required-star {
            color: #d93025;
            margin-left: 0.25rem;
        }
        .radio-label {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 0.25rem;
            transition: background-color 0.2s;
        }
        .radio-label:hover {
            background-color: #f6f8fe;
        }
        .radio-label input[type="radio"] {
            margin-right: 0.75rem;
            width: 1.25rem;
            height: 1.25rem;
            flex-shrink: 0;
            accent-color: #673ab7;
        }
        .image-placeholder {
            display: inline-block;
            background-color: #f8f9fa;
            color: #5f6368;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px dashed #dadce0;
            border-radius: 0.25rem;
            font-style: italic;
            font-size: 0.9rem;
        }
        .correct-ans {
            color: #137333;
            font-weight: bold;
            background-color: #e6f4ea;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }
        .wrong-ans {
            color: #c5221f;
            text-decoration: line-through;
            background-color: #fce8e6;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #673ab7;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-6 text-gray-800">

    <div class="max-w-3xl mx-auto">
        
        <!-- Bahagian Log Masuk Kata Laluan -->
        <div id="loginSection" class="bg-white rounded-lg p-8 shadow-md border border-gray-200 header-card text-center mt-10">
            <h2 class="text-3xl font-normal mb-4 text-gray-800">Kuiz SJAM Tahun 6 (2025)</h2>
            <p class="mb-6 text-gray-600">Sila masukkan kata laluan untuk memulakan kuiz.</p>
            <div class="max-w-xl mx-auto">
                
                <div class="bg-blue-50 border border-blue-200 p-4 mb-6 text-left flex items-start text-sm text-blue-800 rounded-lg">
                    <svg class="w-6 h-6 text-blue-600 mr-3 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p>Masa anda akan direkodkan. Masa mula dikira sebaik sahaja anda berjaya log masuk.</p>
                </div>

                <div class="max-w-sm mx-auto">
                    <input type="password" id="quizPassword" placeholder="Kata Laluan" class="w-full border-b-2 border-gray-300 p-3 mb-6 focus:outline-none focus:border-[#673ab7] text-center text-xl tracking-widest transition-colors bg-gray-50 rounded-t-md" onkeypress="handlePasswordKeyPress(event)">
                    <button id="verifyBtn" type="button" class="w-full bg-[#673ab7] hover:bg-[#5e35b1] text-white font-medium py-2.5 px-4 rounded transition duration-200 flex justify-center items-center">
                        <span id="verifyText">Seterusnya</span>
                        <div id="verifyLoader" class="loader ml-2 hidden" style="border-top-color: white;"></div>
                    </button>
                    <p id="loginMsg" class="mt-4 text-red-600 font-medium hidden"></p>
                </div>
            </div>
        </div>

        <!-- Bahagian Utama Kuiz (Disembunyikan pada asalnya) -->
        <div id="mainQuizSection" class="hidden relative">
            
            <!-- Pengepala Sticky -->
            <div class="sticky top-2 z-50 bg-white/95 backdrop-blur-md rounded-lg p-4 mb-4 shadow-sm border border-gray-200 header-card">
                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
                    <div>
                        <h1 class="text-2xl font-normal text-gray-800 mb-1">KUIZ SJAM TAHUN 6 (2025)</h1>
                        <p class="text-gray-600 text-sm">* Menunjukkan soalan yang diwajibkan</p>
                    </div>
                    
                    <div class="flex items-center text-[#673ab7] font-medium text-sm bg-purple-50 py-1.5 px-3 rounded-full border border-purple-100 shadow-sm w-fit">
                        <svg class="h-4 w-4 mr-1.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Masa direkodkan
                    </div>
                </div>
            </div>

            <!-- Keputusan Kuiz -->
            <div id="resultSection" class="hidden bg-white rounded-lg p-6 mb-6 shadow-md border-t-8 border-t-green-600">
                <h2 class="text-2xl font-normal text-gray-800 mb-4">Keputusan Kuiz</h2>
                <div id="resultText" class="text-lg text-gray-700"></div>
            </div>

            <form id="quizForm">
                <!-- Maklumat Peserta -->
                <div class="question-card">
                    <h2 class="text-lg font-normal mb-4">Maklumat Peserta</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-700">NAMA <span class="required-star">*</span></label>
                            <input type="text" id="studentName" required placeholder="Jawapan anda" class="w-full border-b-2 border-gray-300 p-2 focus:outline-none focus:border-[#673ab7] bg-gray-50 rounded-t-sm transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-700">MY KID NO. <span class="required-star">*</span></label>
                            <input type="text" id="myKidNo" required placeholder="Jawapan anda" class="w-full border-b-2 border-gray-300 p-2 focus:outline-none focus:border-[#673ab7] bg-gray-50 rounded-t-sm transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-700">NAMA SEKOLAH <span class="required-star">*</span></label>
                            <input type="text" id="schoolName" required placeholder="Jawapan anda" class="w-full border-b-2 border-gray-300 p-2 focus:outline-none focus:border-[#673ab7] bg-gray-50 rounded-t-sm transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-700">KOD SEKOLAH <span class="required-star">*</span></label>
                            <input type="text" id="schoolCode" required placeholder="Jawapan anda" class="w-full border-b-2 border-gray-300 p-2 focus:outline-none focus:border-[#673ab7] bg-gray-50 rounded-t-sm transition-colors">
                        </div>
                    </div>
                </div>

                <!-- Bekas Soalan -->
                <div id="questionsContainer"></div>

                <!-- Butang Tindakan -->
                <div class="flex justify-between items-center mt-4 bg-transparent py-4" id="actionButtons">
                    <button type="submit" id="submitBtn" class="bg-[#673ab7] hover:bg-[#5e35b1] text-white font-medium py-2 px-6 rounded shadow transition duration-200 flex items-center">
                        <span id="submitText">Hantar</span>
                        <div id="submitLoader" class="loader ml-2 hidden" style="border-top-color: white;"></div>
                    </button>
                    <button type="reset" class="text-[#673ab7] font-medium py-2 px-4 hover:bg-purple-50 rounded transition duration-200">Kosongkan borang</button>
                </div>
                
                <p id="submitError" class="text-[#d93025] text-sm font-medium mt-2 hidden"></p>

            </form>
        </div>
    </div> 

    <script>
        // =========================================================================
        // MASUKKAN URL GOOGLE APPS SCRIPT (WEB APP) ANDA DI SINI
        // =========================================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwqIX9HHs0Cd8UmJ7timbXQM3fVbzlsakLV-hicoIcTvoM-1YkmtMsDcMomZojGvQZm/exec";
      
        window.quizData = [];
        let startTime = 0;

        function handlePasswordKeyPress(event) {
            if (event.key === "Enter") {
                document.getElementById('verifyBtn').click();
            }
        }

        document.getElementById('verifyBtn').addEventListener('click', function() {
            const password = document.getElementById('quizPassword').value;
            const msgEl = document.getElementById('loginMsg');
            const verifyBtn = document.getElementById('verifyBtn');
            const verifyText = document.getElementById('verifyText');
            const verifyLoader = document.getElementById('verifyLoader');

            if (!password) {
                msgEl.textContent = "Sila masukkan kata laluan!";
                msgEl.classList.remove('hidden');
                return;
            }

            msgEl.classList.add('hidden');
            verifyBtn.disabled = true;
            verifyBtn.classList.add('opacity-75', 'cursor-not-allowed');
            verifyText.textContent = "Memuat turun soalan...";
            verifyLoader.classList.remove('hidden');

            // --- SISTEM FALLBACK UNTUK UJIAN ---
            if(GAS_URL === "LETAK_URL_WEB_APP_ANDA_DI_SINI") {
                setTimeout(() => {
                    if(password === "123456") {
                        window.quizData = fallbackQuizData.map(q => ({
                            q: q[0], img: q[1], options: [q[2], q[3], q[4], q[5]], answer: q[6]
                        }));
                        mulakanKuiz();
                    } else {
                        tunjukRalat("Kata laluan salah! (Cuba '123456' untuk mod percubaan)");
                    }
                }, 800);
                return;
            }
            // ------------------------------------

            const formData = new URLSearchParams();
            formData.append('action', 'verifyPassword');
            formData.append('password', password);

            fetch(GAS_URL, { method: 'POST', body: formData })
            .then(response => response.json())
            .then(data => {
                if (data.status === "CORRECT") {
                    window.quizData = data.data;
                    mulakanKuiz();
                } else {
                    tunjukRalat("Kata laluan salah!");
                }
            })
            .catch(error => {
                console.error("Error:", error);
                tunjukRalat("Ralat rangkaian. Sila cuba lagi.");
            });
            
            function tunjukRalat(teks) {
                msgEl.textContent = teks;
                msgEl.classList.remove('hidden');
                verifyBtn.disabled = false;
                verifyBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                verifyText.textContent = "Seterusnya";
                verifyLoader.classList.add('hidden');
            }
        });

        function mulakanKuiz() {
            renderQuestions(window.quizData);
            startTime = Date.now();
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainQuizSection').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderQuestions(questions) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = ''; 
            
            questions.forEach((q, index) => {
                const qNum = index + 1;
                let optionsHtml = '';
                
                q.options.forEach((opt, oIndex) => {
                    if(opt && opt.trim() !== "") {
                        let optStr = opt.trim();
                        let displayContent = '';
                        
                        // Check if it has a prefix like "A. " or "A) " followed by a URL/Path
                        let prefixMatch = optStr.match(/^([a-zA-Z][\.\)]?\s*)(.*?\.(?:jpg|jpeg|png|gif|webp)|http[^\s]+|data:image[^\s]+)$/i);
                        // Check if the whole string is an image path/url
                        let isImage = /^(http[^\s]+|data:image[^\s]+|.*?\.(?:jpg|jpeg|png|gif|webp))$/i.test(optStr);

                        if (prefixMatch) {
                            displayContent = `<span class="font-medium mr-2 text-gray-700 ml-2">${prefixMatch[1]}</span><img src="${prefixMatch[2]}" alt="Pilihan" class="max-h-32 object-contain rounded border border-gray-200 bg-white p-1">`;
                        } else if (isImage) {
                            displayContent = `<img src="${optStr}" alt="Pilihan" class="max-h-32 object-contain rounded border border-gray-200 bg-white p-1 ml-2">`;
                        } else {
                            displayContent = `<span class="text-gray-700 leading-relaxed ml-2">${optStr}</span>`;
                        }
                        
                        optionsHtml += `
                            <label class="radio-label">
                                <input type="radio" name="q${qNum}" value="${oIndex + 1}" required> 
                                ${displayContent}
                            </label>
                        `;
                    }
                });

                let imageHtml = '';
                if (q.img && q.img.trim() !== "") {
                    let imgStr = q.img.trim();
                    if (imgStr.startsWith('http') || imgStr.startsWith('data:image') || /\.(jpg|jpeg|png|gif|webp)/i.test(imgStr)) {
                        imageHtml = `<img src="${imgStr}" alt="Gambar Soalan" class="max-w-full h-auto mx-auto my-4 rounded shadow-sm max-h-64 object-contain border border-gray-200 p-1">`;
                    } else {
                        imageHtml = `<div class="image-placeholder w-full text-center">${imgStr}</div>`;
                    }
                }

                let questionText = q.q.replace(/\n/g, '<br>');

                container.innerHTML += `
                    <div class="question-card" id="card-q${qNum}">
                        <p class="text-[1.05rem] mb-4 text-gray-900 leading-relaxed font-normal">${qNum}. ${questionText} <span class="required-star">*</span></p>
                        ${imageHtml}
                        <div class="space-y-1 mt-4">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('quizForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            let endTime = Date.now();
            let timeTakenMs = endTime - startTime;
            let minutes = Math.floor(timeTakenMs / 60000);
            let seconds = Math.floor((timeTakenMs % 60000) / 1000);
            let durationStr = `${minutes} minit ${seconds} saat`;

            let score = 0;
            let totalQuestions = window.quizData.length;
            let answeredAll = true;

            const submitError = document.getElementById('submitError');
            submitError.classList.add('hidden');

            window.quizData.forEach((q, index) => {
                const qNum = index + 1;
                const selectedOption = document.querySelector(`input[name="q${qNum}"]:checked`);
                const card = document.getElementById(`card-q${qNum}`);
                
                if (!selectedOption) {
                    answeredAll = false;
                    card.classList.add('border-red-400', 'border-2');
                } else {
                    card.classList.remove('border-red-400', 'border-2');
                }
            });

            if (!answeredAll) {
                submitError.innerHTML = "⚠️ Terdapat soalan yang belum dijawab. Sila semak kotak yang ditandakan merah.";
                submitError.classList.remove('hidden');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitLoader = document.getElementById('submitLoader');
            
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            submitText.textContent = "Menghantar...";
            submitLoader.classList.remove('hidden');

            window.quizData.forEach((q, index) => {
                const qNum = index + 1;
                const selectedOption = document.querySelector(`input[name="q${qNum}"]:checked`);
                const allOptions = document.querySelectorAll(`input[name="q${qNum}"]`);
                const correctValue = q.answer.toString();

                allOptions.forEach(opt => opt.disabled = true);

                if (selectedOption) {
                    if (selectedOption.value === correctValue) {
                        score++;
                        selectedOption.parentElement.classList.add('correct-ans');
                    } else {
                        selectedOption.parentElement.classList.add('wrong-ans');
                        const correctLabel = document.querySelector(`input[name="q${qNum}"][value="${correctValue}"]`);
                        if(correctLabel) {
                            correctLabel.parentElement.classList.add('correct-ans');
                            correctLabel.parentElement.innerHTML += ' <span class="ml-auto text-sm text-green-800 font-semibold italic">Jawapan Sebenar</span>';
                        }
                    }
                }
            });

            const name = document.getElementById('studentName').value;
            const myKid = document.getElementById('myKidNo').value;
            const school = document.getElementById('schoolName').value;
            const code = document.getElementById('schoolCode').value;

            // --- JIKA MENGGUNAKAN FALLBACK MODE (UJIAN) ---
            if(GAS_URL === "LETAK_URL_WEB_APP_ANDA_DI_SINI") {
                setTimeout(() => {
                    showResults(name, myKid, school, code, score, totalQuestions, durationStr);
                }, 1000);
                return;
            }

            const formData = new URLSearchParams();
            formData.append('action', 'submitScore');
            formData.append('name', name);
            formData.append('mykid', myKid);
            formData.append('schoolName', school);
            formData.append('schoolCode', code);
            formData.append('score', score + " / " + totalQuestions);
            formData.append('duration', durationStr);

            fetch(GAS_URL, { method: 'POST', body: formData })
            .then(response => response.text())
            .then(result => {
                showResults(name, myKid, school, code, score, totalQuestions, durationStr);
            })
            .catch(error => {
                console.error("Save Error:", error);
                showResults(name, myKid, school, code, score, totalQuestions, durationStr); // Tetap tunjuk markah jika gagal simpan
            });
        });

        function showResults(name, myKid, school, code, score, totalQuestions, durationStr) {
            const resultSection = document.getElementById('resultSection');
            const resultText = document.getElementById('resultText');
            
            let percentage = (score / totalQuestions) * 100;
            let grade = "";
            if(percentage >= 80) grade = "Cemerlang! 🎉";
            else if(percentage >= 50) grade = "Baik, teruskan usaha! 👍";
            else grade = "Jangan putus asa, cuba lagi! 💪";

            resultText.innerHTML = `
                <div class="bg-gray-50 p-4 rounded-md border border-gray-200 mb-4">
                    <p class="mb-1 text-sm text-gray-500">Nama Peserta</p>
                    <p class="font-medium text-gray-800 mb-3">${name} <span class="text-xs text-gray-500 bg-gray-200 px-2 py-0.5 rounded-full ml-2">${myKid}</span></p>
                    
                    <p class="mb-1 text-sm text-gray-500">Sekolah</p>
                    <p class="font-medium text-gray-800">${school} (${code})</p>
                </div>
                
                <div class="text-center py-6">
                    <p class="text-5xl mb-2 font-normal text-gray-800">${score} <span class="text-2xl text-gray-500">/ ${totalQuestions}</span></p>
                    <p class="text-lg font-medium text-[#137333] mb-4">${grade}</p>
                    <p class="inline-block text-sm font-medium text-gray-600 bg-gray-100 px-4 py-2 rounded-full">Masa yang diambil: ⏱️ ${durationStr}</p>
                </div>
            `;
            
            resultSection.classList.remove('hidden');
            document.getElementById('actionButtons').classList.add('hidden'); 
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
