<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单元5：人人夸我有礼貌</title>
    <!-- 引入 Tailwind CSS 进行快速美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 SweetAlert2 替代原生 Alert，提供更精美的弹窗 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- 引入 Canvas Confetti 用于结束时的庆祝特效 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- 引入 Google 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- 引入 FontAwesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Nunito', 'ZCOOL KuaiLe', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation; /* 优化触摸体验 */
        }

        /* 标题卡通字体 */
        .title-font {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        /* 卡片玻璃拟物化风格 */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border-radius: 24px;
        }

        /* 呼吸动画效果 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }

        /* 答题按钮缩放效果 */
        .btn-hover-effect {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-hover-effect:active {
            transform: scale(0.95);
        }
        .btn-hover-effect:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 正确/错误视觉反馈特效 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake-animation { animation: shake 0.5s; }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .pop-animation { animation: pop 0.5s; }

        .correct-bg { background-color: #a7f3d0 !important; border-color: #10b981 !important; color: #065f46 !important;}
        .wrong-bg { background-color: #fecaca !important; border-color: #ef4444 !important; color: #991b1b !important;}

        /* 隐藏元素的通用类 */
        .hidden-screen { display: none !important; }

        /* 进度条动画 */
        .progress-bar-fill {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 场景Emoji大小调整 */
        .scene-emoji {
            font-size: 5rem;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- 粒子背景层 -->
    <div id="particles" class="fixed inset-0 pointer-events-none z-0 opacity-50"></div>

    <div id="screen-welcome" class="glass-card w-full max-w-md p-8 text-center relative z-10 floating">
        <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 text-6xl">🏫</div>
        <h1 class="title-font text-4xl text-pink-500 font-bold mt-6 mb-2">人人夸我有礼貌</h1>
        <p class="text-lg text-gray-600 mb-6 font-bold">一年级道德教育小游戏</p>
        
        <div class="mb-6 text-left">
            <label class="block text-gray-700 font-bold mb-2 pl-2" for="studentName">
                <i class="fa-solid fa-user-graduate text-blue-500 mr-2"></i>你的名字是？
            </label>
            <input class="shadow appearance-none border-2 border-blue-200 rounded-2xl w-full py-4 px-4 text-gray-700 leading-tight focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all text-xl text-center" id="studentName" type="text" placeholder="输入姓名">
        </div>
        
        <button onclick="startLearning()" class="w-full bg-gradient-to-r from-blue-400 to-purple-500 hover:from-blue-500 hover:to-purple-600 text-white font-bold py-4 px-8 rounded-full shadow-lg btn-hover-effect text-xl">
            开始学习 <i class="fa-solid fa-play ml-2"></i>
        </button>
    </div>

    <div id="screen-learn" class="glass-card w-full max-w-lg p-6 text-center relative z-10 hidden-screen">
        <h2 class="title-font text-3xl text-purple-600 font-bold mb-4">什么是好行为？🤔</h2>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <!-- 好的行为示范 -->
            <div class="bg-green-100 p-4 rounded-2xl border-2 border-green-300">
                <div class="text-4xl mb-2">✅</div>
                <div class="text-5xl mb-2">🤝</div>
                <p class="font-bold text-green-700">排队、说谢谢、<br>打招呼</p>
            </div>
            <!-- 坏的行为示范 -->
            <div class="bg-red-100 p-4 rounded-2xl border-2 border-red-300">
                <div class="text-4xl mb-2">❌</div>
                <div class="text-5xl mb-2">😠</div>
                <p class="font-bold text-red-700">插队、大声吵闹、<br>不理人</p>
            </div>
        </div>

        <p class="text-lg text-gray-700 font-bold mb-6 bg-yellow-100 p-3 rounded-xl border border-yellow-300">
            有礼貌的孩子，大家都喜欢！准备好挑战了吗？
        </p>

        <button onclick="startQuiz()" class="w-full bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-4 px-8 rounded-full shadow-lg btn-hover-effect text-xl">
            开始挑战 <i class="fa-solid fa-gamepad ml-2"></i>
        </button>
    </div>

    <div id="screen-quiz" class="glass-card w-full max-w-md p-6 relative z-10 hidden-screen">
        <!-- 进度条 -->
        <div class="mb-4">
            <div class="flex justify-between text-sm font-bold text-gray-500 mb-1">
                <span>进度</span>
                <span id="progress-text">1/5</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-3 rounded-full progress-bar-fill" style="width: 20%"></div>
            </div>
        </div>

        <!-- 情境图片/Emoji展示区 -->
        <div class="bg-blue-50 rounded-2xl p-6 mb-6 text-center border-2 border-blue-100 relative overflow-hidden">
            <!-- 提示气泡 (Scaffolding) -->
            <div id="hint-bubble" class="absolute top-2 right-2 bg-yellow-300 text-yellow-800 text-xs font-bold px-3 py-1 rounded-full shadow-sm animate-pulse cursor-pointer" onclick="showHint()">
                <i class="fa-solid fa-lightbulb"></i> 提示
            </div>
            <div id="question-emoji" class="scene-emoji mb-4 mt-4 transition-transform duration-500">🍽️</div>
            <h2 id="question-text" class="text-xl font-bold text-gray-800 title-font">吃饭时，你应该怎么做？</h2>
        </div>

        <!-- 选项区 -->
        <div id="options-container" class="space-y-4">
            <!-- 按钮由 JS 动态生成 -->
        </div>
    </div>

    <div id="screen-result" class="glass-card w-full max-w-md p-8 text-center relative z-10 hidden-screen">
        <div id="result-emoji" class="text-7xl mb-4 floating">🏆</div>
        <h2 id="result-title" class="title-font text-4xl font-bold mb-2 text-pink-500">太棒了！</h2>
        <p class="text-xl font-bold text-gray-700 mb-6">
            <span id="display-name" class="text-blue-600">小明</span>，你的得分是：
        </p>
        
        <div class="bg-yellow-100 border-4 border-yellow-300 rounded-full w-32 h-32 flex items-center justify-center mx-auto mb-6 shadow-inner">
            <span id="score-display" class="text-5xl font-black text-yellow-600 title-font">5/5</span>
        </div>

        <p id="result-message" class="text-lg text-gray-600 font-bold mb-8">你是个非常有礼貌的好孩子！</p>

        <!-- 提交数据状态提示 -->
        <div id="loading-spinner" class="hidden-screen mb-4">
            <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500"></i>
            <p class="text-sm text-gray-500 mt-2">正在把成绩交给老师...</p>
        </div>

        <button id="btn-restart" onclick="location.reload()" class="w-full bg-gradient-to-r from-gray-400 to-gray-500 hover:from-gray-500 hover:to-gray-600 text-white font-bold py-3 px-8 rounded-full shadow-lg btn-hover-effect hidden-screen mt-4">
            再玩一次 <i class="fa-solid fa-rotate-right ml-2"></i>
        </button>
    </div>

    <script>
        // === 配置区域 ===
        // TODO: 老师，请将下面的URL替换为您部署Google Apps Script后获得的Web App URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_nQZ_wOutgW3B0C5X6I5cQpPmwISfV-9g2bGy1Cghj6iphAnyQTcjiww9omcGqbku/exec"; 
        
        // 游戏数据 (题库设计基于提供的课本内容，强化视觉和情境)
        const quizData = [
            {
                emoji: "👨‍👩‍👧‍👦 🍽️",
                question: "和家人一起吃饭时，你应该怎么做？",
                options: [
                    { text: "自己先吃，不管别人", isCorrect: false, icon: "fa-xmark" },
                    { text: "说：爷爷奶奶，请吃饭", isCorrect: true, icon: "fa-check" }
                ],
                hint: "想一想课本第22页，我们要尊敬长辈哦。"
            },
            {
                emoji: "🚌 💺",
                question: "在巴士上看到同学旁边的空位，想坐下，该怎么说？",
                options: [
                    { text: "坐进去！(态度霸道)", isCorrect: false, icon: "fa-xmark" },
                    { text: "请问有人坐吗？", isCorrect: true, icon: "fa-check" }
                ],
                hint: "课本第27页教我们，要有礼貌地询问别人。"
            },
            {
                emoji: "🏃‍♂️ 💥 🙍‍♀️",
                question: "下课时不小心撞到了同学，你应该说什么？",
                options: [
                    { text: "对不起", isCorrect: true, icon: "fa-check" },
                    { text: "走开啦！", isCorrect: false, icon: "fa-xmark" }
                ],
                hint: "做错事的时候，我们要勇敢道歉哦。"
            },
            {
                emoji: "🏫 👩‍🏫",
                question: "早上来到学校，看到老师，你应该怎样做？",
                options: [
                    { text: "低着头，假装没看到", isCorrect: false, icon: "fa-xmark" },
                    { text: "主动说：老师，早安！", isCorrect: true, icon: "fa-check" }
                ],
                hint: "主动打招呼是有礼貌的表现（课本第26页）。"
            },
            {
                emoji: "✏️ 🤲 😊",
                question: "同学借给你彩色笔，你应该对他说什么？",
                options: [
                    { text: "谢谢你", isCorrect: true, icon: "fa-check" },
                    { text: "拿了就走", isCorrect: false, icon: "fa-xmark" }
                ],
                hint: "得到别人的帮助后，一定要表达感谢哦。"
            }
        ];

        // 状态变量
        let currentQuestionIndex = 0;
        let score = 0;
        let studentName = "";
        let isAnswering = false;

        function hideAllScreens() {
            document.getElementById('screen-welcome').classList.add('hidden-screen');
            document.getElementById('screen-learn').classList.add('hidden-screen');
            document.getElementById('screen-quiz').classList.add('hidden-screen');
            document.getElementById('screen-result').classList.add('hidden-screen');
        }

        function startLearning() {
            const nameInput = document.getElementById('studentName').value.trim();
            if (!nameInput) {
                Swal.fire({
                    icon: 'warning',
                    title: '等等呀',
                    text: '请先输入你的名字哦！',
                    confirmButtonColor: '#3b82f6',
                    confirmButtonText: '好的'
                });
                return;
            }
            studentName = nameInput;
            hideAllScreens();
            document.getElementById('screen-learn').classList.remove('hidden-screen');
            // 添加出现动画
            document.getElementById('screen-learn').classList.add('animate__animated', 'animate__zoomIn');
        }

        function startQuiz() {
            hideAllScreens();
            document.getElementById('screen-quiz').classList.remove('hidden-screen');
            loadQuestion();
        }

        function loadQuestion() {
            isAnswering = false;
            const q = quizData[currentQuestionIndex];
            
            // 更新进度条
            const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1}/${quizData.length}`;

            // 更新内容
            const emojiEl = document.getElementById('question-emoji');
            emojiEl.innerText = q.emoji;
            emojiEl.classList.remove('pop-animation');
            void emojiEl.offsetWidth; // trigger reflow
            emojiEl.classList.add('pop-animation');

            document.getElementById('question-text').innerText = q.question;

            // 生成选项
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            // 随机打乱选项 (Fisher-Yates)
            let shuffledOptions = [...q.options];
            for (let i = shuffledOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
            }

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-white border-2 border-blue-200 text-gray-700 font-bold py-4 px-6 rounded-2xl shadow-sm text-lg text-left relative overflow-hidden btn-hover-effect';
                btn.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span>${opt.text}</span>
                        <i class="fa-solid fa-circle-question text-gray-300 option-icon opacity-50"></i>
                    </div>
                `;
                btn.onclick = () => selectAnswer(opt.isCorrect, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function showHint() {
            const q = quizData[currentQuestionIndex];
            Swal.fire({
                title: '小提示',
                text: q.hint,
                icon: 'info',
                confirmButtonColor: '#f59e0b',
                confirmButtonText: '知道啦！'
            });
        }

        function selectAnswer(isCorrect, btnElement) {
            if (isAnswering) return; // 防止重复点击
            isAnswering = true;

            const icon = btnElement.querySelector('.option-icon');
            
            if (isCorrect) {
                // 回答正确：变绿，放大动画，加分
                score++;
                btnElement.classList.add('correct-bg', 'pop-animation');
                icon.className = 'fa-solid fa-circle-check text-green-700 text-2xl';
                playSound('correct'); // 可选：添加声音效，这里用视觉替代
            } else {
                // 回答错误：变红，震动动画
                btnElement.classList.add('wrong-bg', 'shake-animation');
                icon.className = 'fa-solid fa-circle-xmark text-red-700 text-2xl';
                
                // 找出并高亮正确答案
                const buttons = document.querySelectorAll('#options-container button');
                buttons.forEach(b => {
                    const textSpan = b.querySelector('span').innerText;
                    const correctOpt = quizData[currentQuestionIndex].options.find(o => o.isCorrect);
                    if (textSpan === correctOpt.text) {
                        setTimeout(() => {
                            b.classList.add('correct-bg');
                            b.querySelector('.option-icon').className = 'fa-solid fa-circle-check text-green-700 text-2xl';
                        }, 500);
                    }
                });
            }

            // 延迟后进入下一题
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    // 添加切页淡出淡入过渡效果
                    document.getElementById('options-container').style.opacity = 0;
                    setTimeout(() => {
                        loadQuestion();
                        document.getElementById('options-container').style.opacity = 1;
                    }, 300);
                } else {
                    showResult();
                }
            }, 1500); // 1.5秒后进入下一题
        }

        function showResult() {
            hideAllScreens();
            const resultScreen = document.getElementById('screen-result');
            resultScreen.classList.remove('hidden-screen');
            
            // 更新进度条满状态
            document.getElementById('progress-bar').style.width = '100%';
            
            document.getElementById('display-name').innerText = studentName;
            document.getElementById('score-display').innerText = `${score}/${quizData.length}`;

            let message = "";
            let emoji = "";
            if (score === quizData.length) {
                message = "太完美了！你是全校最懂礼貌的乖孩子！🌟";
                emoji = "🏆";
                triggerConfetti();
            } else if (score >= quizData.length - 2) {
                message = "很不错哦！继续保持有礼貌的行为！👍";
                emoji = "⭐";
                triggerConfetti();
            } else {
                message = "要加油哦！多看课本复习什么是好礼貌。💪";
                emoji = "🌱";
            }
            document.getElementById('result-message').innerText = message;
            document.getElementById('result-emoji').innerText = emoji;

            // 自动提交成绩
            submitScoreToGoogleSheets();
        }

        function triggerConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // 简单的伪音效（视觉反馈补充）
        function playSound(type) {
             // 考虑到浏览器自动播放策略，这里留空或可自行加入HTML5 Audio
             // 对于学生使用的网页，过度依赖声音不如视觉动画稳定
        }

        // 提交数据到 Google Spreadsheet (Apps Script)
        function submitScoreToGoogleSheets() {
            if (SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE") {
                console.log("未配置 SCRIPT_URL，跳过成绩提交。");
                document.getElementById('btn-restart').classList.remove('hidden-screen');
                return;
            }

            document.getElementById('loading-spinner').classList.remove('hidden-screen');

            const payload = {
                name: studentName,
                score: score,
                total: quizData.length
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // 避免跨域问题，但无法读取响应内容
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
            .then(() => {
                // 因为是 no-cors，假设请求发送成功
                setTimeout(() => {
                    document.getElementById('loading-spinner').classList.add('hidden-screen');
                    document.getElementById('btn-restart').classList.remove('hidden-screen');
                    
                    Swal.fire({
                        icon: 'success',
                        title: '交卷成功！',
                        text: '老师已经收到你的成绩啦！',
                        timer: 2000,
                        showConfirmButton: false
                    });
                }, 1000);
            })
            .catch((error) => {
                console.error('Error!', error.message);
                document.getElementById('loading-spinner').classList.add('hidden-screen');
                document.getElementById('btn-restart').classList.remove('hidden-screen');
                
                Swal.fire({
                    icon: 'error',
                    title: '哎呀',
                    text: '网络好像有点问题，成绩没发出去。',
                    confirmButtonText: '知道了'
                });
            });
        }
    </script>
</body>
</html>
