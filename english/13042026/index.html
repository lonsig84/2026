<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary Practice - Part 5</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Canvas Confetti for celebration effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- 引入可爱的圆润字体 Quicksand -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Quicksand', 'Segoe UI', Tahoma, sans-serif; 
            /* 马卡龙渐变背景 */
            background: linear-gradient(135deg, #fce7f3 0%, #e0e7ff 50%, #d1fae5 100%);
            background-attachment: fixed;
        }
        
        /* 玻璃拟物卡片风格 */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }
        
        /* 马卡龙字母输入框 */
        .letter-box { 
            width: 34px; height: 40px; text-align: center; text-transform: lowercase; 
            font-size: 1.35rem; font-weight: 700; border: none; 
            border-bottom: 3px solid #cbd5e1; margin: 0 3px; outline: none; 
            background-color: rgba(255,255,255,0.6); border-radius: 6px 6px 0 0;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); 
            color: #475569;
        }
        .letter-box:focus { 
            border-bottom: 3px solid #f472b6; /* 粉色底边 */
            background-color: #fdf2f8; 
            color: #db2777;
            transform: translateY(-4px) scale(1.05); 
            box-shadow: 0 4px 10px rgba(244, 114, 182, 0.15);
        }
        .letter-box:disabled { 
            border-bottom: 3px solid #a78bfa; /* 提示首字母用紫色 */
            color: #8b5cf6; 
            background-color: transparent; 
        }
        
        .table-borders th, .table-borders td { border: 1px dashed #e2e8f0; padding: 16px 12px; }
        
        /* 输入时的Q弹动画 */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25) translateY(-3px); color: #ec4899; }
            100% { transform: scale(1); }
        }
        .pop-anim { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* 成绩环形图的动画 */
        @keyframes dash {
            0% { stroke-dasharray: 0, 100; }
            100% { stroke-dasharray: var(--target-dash), 100; }
        }
        .circular-chart-path {
            animation: dash 1.5s ease-out forwards;
            stroke-linecap: round;
        }
        
        /* 彩虹进度条 */
        .rainbow-bg {
            background: linear-gradient(90deg, #f472b6, #a78bfa, #60a5fa, #34d399);
            background-size: 300% 100%;
            animation: gradient-move 3s ease infinite;
        }
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center items-start">

<script>
    // ==========================================
    // 配置区域
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwZduuXP2jAEd828gbn13yZDShE9Qg4FPq9McgUQPYGc23EULNRdErCi6-15HHZe5Ewzw/exec"; 
    // ==========================================

    const quizzes = [
        {
            id: 1,
            title: "Set 1: Emergencies & Accidents",
            example: { no: 0, desc: "A form of transport that takes people to a hospital.", word: "ambulance" },
            questions: [
                { no: 21, desc: "You use this in the kitchen to heat food and make meals.", word: "cooker" },
                { no: 22, desc: "A sudden dangerous situation that needs immediate action.", word: "emergency" },
                { no: 23, desc: "This stops working during a power cut, making the room dark.", word: "electricity" },
                { no: 24, desc: "You put this on to stay warm or heat a room in winter.", word: "heating" },
                { no: 25, desc: "A sudden bad event that can hurt people or damage things.", word: "accident" }
            ]
        },
        {
            id: 2,
            title: "Set 2: Life in the Past",
            example: { no: 0, desc: "A book where you write down what you do every day.", word: "diary" },
            questions: [
                { no: 21, desc: "A small, traditional house, usually in the countryside.", word: "cottage" },
                { no: 22, desc: "Someone whose job is to clean another person's house and help them.", word: "servant" },
                { no: 23, desc: "You wear this on your wrist to know what time it is.", word: "watch" },
                { no: 24, desc: "A painting, drawing or photograph of a person's face.", word: "portrait" },
                { no: 25, desc: "Something that belongs to you and you own it.", word: "possession" }
            ]
        },
        {
            id: 3,
            title: "Set 3: Adventure & Camping",
            example: { no: 0, desc: "An instrument used for showing direction.", word: "compass" },
            questions: [
                { no: 21, desc: "A large area of land covered with trees and plants growing closely together.", word: "forest" },
                { no: 22, desc: "A small, narrow boat that you move using a paddle with two blades.", word: "kayak" },
                { no: 23, desc: "An animal that carries its house on its back and lays eggs on the beach.", word: "turtle" },
                { no: 24, desc: "A large bag you carry on your back when you go walking or camping.", word: "rucksack" },
                { no: 25, desc: "A person whose job is to teach you a new sport or skill.", word: "instructor" }
            ]
        },
        {
            id: 4,
            title: "Set 4: Places & Environment",
            example: { no: 0, desc: "A place with fields for keeping animals such as cows and sheep.", word: "farm" },
            questions: [
                { no: 21, desc: "The natural features of an area, like mountains and rivers, that you can see.", word: "landscape" },
                { no: 22, desc: "A place where you can go to see many different kinds of wild animals.", word: "zoo" },
                { no: 23, desc: "Animals, birds, and plants that live in their natural environment.", word: "wildlife" },
                { no: 24, desc: "A very high piece of land, often with snow on top, where people go skiing.", word: "mountain" },
                { no: 25, desc: "People live in this place, but it is not as big as a town or city.", word: "village" }
            ]
        },
        {
            id: 5,
            title: "Set 5: Things we use & Jobs",
            example: { no: 0, desc: "You need this to watch your favourite movie or shows.", word: "television" },
            questions: [
                { no: 21, desc: "This person uses a camera to take pictures of you and the scenery.", word: "photographer" },
                { no: 22, desc: "Someone who paints pictures or creates beautiful things.", word: "artist" },
                { no: 23, desc: "A small electronic machine used for doing math quickly.", word: "calculator" },
                { no: 24, desc: "You need to wear this warm piece of clothing when you are feeling cold.", word: "sweater" },
                { no: 25, desc: "He or she is the main person who cooks in a hotel or restaurant.", word: "chef" }
            ]
        }
    ];

    // 马卡龙悬停颜色组
    const macaronHoverClasses = [
        "hover:bg-pink-50 hover:border-pink-300 group-hover:text-pink-500 hover:shadow-[0_8px_20px_rgba(244,114,182,0.15)]", // 樱花粉
        "hover:bg-blue-50 hover:border-blue-300 group-hover:text-blue-500 hover:shadow-[0_8px_20px_rgba(96,165,250,0.15)]", // 天空蓝
        "hover:bg-emerald-50 hover:border-emerald-300 group-hover:text-emerald-500 hover:shadow-[0_8px_20px_rgba(52,211,153,0.15)]", // 薄荷绿
        "hover:bg-amber-50 hover:border-amber-300 group-hover:text-amber-500 hover:shadow-[0_8px_20px_rgba(251,191,36,0.15)]", // 奶酪黄
        "hover:bg-purple-50 hover:border-purple-300 group-hover:text-purple-500 hover:shadow-[0_8px_20px_rgba(167,139,250,0.15)]" // 香芋紫
    ];

    let currentQuiz = null;
    let studentName = "";
    let studentAnswers = {};

    document.addEventListener("DOMContentLoaded", () => {
        lucide.createIcons();
        renderMainMenu();
    });

    function renderMainMenu() {
        const container = document.getElementById("app");
        container.innerHTML = `
            <div class="max-w-2xl w-full glass-card rounded-[2rem] p-8 md:p-10 transition-all relative overflow-hidden">
                <!-- 装饰性背景球 -->
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-pink-300 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob"></div>
                <div class="absolute top-40 -left-10 w-40 h-40 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob animation-delay-2000"></div>
                
                <div class="text-center mb-10 relative z-10">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-pink-100 to-purple-100 rounded-2xl shadow-inner mb-4 transform -rotate-3">
                        <i data-lucide="book-heart" class="h-10 w-10 text-pink-400"></i>
                    </div>
                    <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500">English Practice</h1>
                    <p class="text-purple-400 mt-2 font-semibold tracking-wide uppercase text-sm">Part 5 Reading & Writing</p>
                </div>
                
                <div class="mb-8 relative z-10">
                    <label class="block text-sm font-bold text-gray-600 mb-3 ml-2">Who is playing?</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="smile" class="h-5 w-5 text-pink-300"></i>
                        </div>
                        <input type="text" id="studentNameInput" class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-pink-100 focus:ring-4 focus:ring-pink-100 focus:border-pink-300 transition-all outline-none text-lg text-gray-700 bg-white/60 font-semibold" placeholder="Enter your name here..." value="${studentName}">
                    </div>
                </div>

                <h2 class="text-xl font-bold text-gray-700 mb-4 ml-2 relative z-10">Choose a level:</h2>
                <div class="grid gap-4 relative z-10">
                    ${quizzes.map((q, index) => `
                        <button onclick="startQuiz(${q.id})" class="flex items-center justify-between w-full text-left px-6 py-5 bg-white border-2 border-transparent shadow-sm rounded-2xl transition-all duration-300 group ${macaronHoverClasses[index % macaronHoverClasses.length]} transform hover:-translate-y-1">
                            <div class="flex items-center">
                                <span class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-gray-500 font-bold mr-4 group-hover:bg-white group-hover:shadow-sm transition-all">${index+1}</span>
                                <span class="font-bold text-gray-700 text-lg transition-colors">${q.title}</span>
                            </div>
                            <i data-lucide="arrow-right" class="text-gray-300 transform group-hover:translate-x-2 transition-all"></i>
                        </button>
                    `).join('')}
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    function startQuiz(quizId) {
        const nameInput = document.getElementById("studentNameInput").value.trim();
        if (!nameInput) {
            // 用一个可爱的弹窗代替原生alert
            const btn = document.getElementById("studentNameInput");
            btn.classList.add("border-red-400", "animate-bounce");
            setTimeout(() => btn.classList.remove("border-red-400", "animate-bounce"), 1000);
            return;
        }
        studentName = nameInput;
        currentQuiz = quizzes.find(q => q.id === quizId);
        studentAnswers = {};
        renderQuizInterface();
        setTimeout(checkProgress, 100);
    }

    function generateLetterBoxes(word, questionNo, isExample = false) {
        let html = '<div class="flex flex-wrap gap-1 mt-1">';
        for (let i = 0; i < word.length; i++) {
            if (i === 0 || isExample) {
                html += `<input type="text" class="letter-box" value="${word[i]}" disabled>`;
            } else {
                html += `<input type="text" class="letter-box bg-white/80" maxlength="1" data-qno="${questionNo}" data-index="${i}" oninput="handleInput(event)" onkeydown="handleKeyDown(event)">`;
            }
        }
        html += '</div>';
        return html;
    }

    function renderQuizInterface() {
        const container = document.getElementById("app");
        let html = `
            <div class="max-w-4xl w-full glass-card rounded-[2rem] p-6 md:p-10 transition-all relative overflow-hidden shadow-2xl">
                
                <!-- 马卡龙彩虹进度条 -->
                <div class="absolute top-0 left-0 w-full h-2 bg-gray-100">
                    <div id="progressBar" class="h-full rainbow-bg transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>

                <div class="flex justify-between items-center mb-6 mt-4">
                    <button onclick="renderMainMenu()" class="flex items-center text-gray-400 hover:text-pink-500 font-bold transition-colors bg-white/50 px-4 py-2 rounded-xl">
                        <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i> Back
                    </button>
                    <div id="progressBadge" class="bg-pink-50 text-pink-500 px-4 py-2 rounded-xl text-sm font-bold border border-pink-100 flex items-center transition-all shadow-sm">
                        <i data-lucide="star" class="w-4 h-4 mr-2 fill-current"></i>
                        <span id="progressText">0 / 5 Completed</span>
                    </div>
                </div>
                
                <div class="text-center font-bold mb-8">
                    <h2 class="text-3xl text-gray-800 drop-shadow-sm tracking-wide">PART 5</h2>
                    <p class="text-lg font-semibold text-purple-400 mt-1 bg-purple-50 inline-block px-4 py-1 rounded-full border border-purple-100">[5 marks]</p>
                </div>

                <div class="mb-8 font-medium text-gray-700 text-lg bg-gradient-to-r from-blue-50 to-indigo-50 p-5 rounded-2xl border border-blue-100 shadow-sm relative">
                    <div class="absolute -left-3 -top-3 w-8 h-8 bg-blue-400 rounded-full flex items-center justify-center text-white shadow-md">
                        <i data-lucide="info" class="w-5 h-5"></i>
                    </div>
                    <p class="font-bold text-blue-800 ml-2">Questions 21 to 25</p>
                    <p class="font-semibold mt-2 ml-2">Read the descriptions of some words. What is the word for each one?</p>
                    <p class="text-gray-500 text-base ml-2 mt-1">The first letter is already there. There is one space for each letter in the word.</p>
                </div>

                <div class="overflow-x-auto rounded-2xl border-2 border-pink-100 bg-white/60 shadow-inner p-1">
                    <table class="w-full text-left border-collapse table-borders">
                        <tr class="bg-purple-50/50">
                            <td class="w-12 text-center font-bold text-xl text-purple-600 border-b-2 border-pink-100 rounded-tl-xl">${currentQuiz.example.no}</td>
                            <td class="text-gray-700 text-lg py-5 px-4 border-b-2 border-pink-100 font-medium">${currentQuiz.example.desc}</td>
                            <td class="whitespace-nowrap px-4 align-middle border-b-2 border-pink-100">
                                ${generateLetterBoxes(currentQuiz.example.word, currentQuiz.example.no, true)}
                            </td>
                            <td class="w-12 text-center align-middle border-b-2 border-pink-100 rounded-tr-xl">
                                <i data-lucide="check" class="w-8 h-8 text-purple-300 mx-auto bg-purple-100 rounded-full p-1"></i>
                            </td>
                        </tr>
                        ${currentQuiz.questions.map(q => `
                        <tr id="row-${q.no}" class="transition-all duration-500 ease-out hover:bg-pink-50/30">
                            <td class="w-12 text-center font-bold text-xl text-gray-400">${q.no}</td>
                            <td class="text-gray-700 text-lg py-5 px-4 leading-relaxed font-medium">${q.desc}</td>
                            <td class="whitespace-nowrap px-4 align-middle">
                                ${generateLetterBoxes(q.word, q.no, false)}
                            </td>
                            <td class="w-12 text-center align-middle" id="status-${q.no}"></td>
                        </tr>
                        `).join('')}
                    </table>
                </div>

                <div class="mt-10 flex justify-end">
                    <button onclick="submitQuiz()" class="bg-gradient-to-r from-pink-400 to-purple-500 hover:from-pink-500 hover:to-purple-600 text-white font-bold py-4 px-10 rounded-full shadow-[0_8px_20px_rgba(219,39,119,0.3)] hover:shadow-[0_12px_25px_rgba(219,39,119,0.4)] transition-all flex items-center transform hover:-translate-y-1 text-lg">
                        <i data-lucide="party-popper" class="w-6 h-6 mr-3"></i> Finish & Check
                    </button>
                </div>
            </div>
        `;
        container.innerHTML = html;
        lucide.createIcons();
    }

    window.handleInput = function(e) {
        const target = e.target;
        target.value = target.value.toLowerCase();
        
        target.classList.remove('pop-anim');
        void target.offsetWidth; 
        if(target.value) target.classList.add('pop-anim');

        if (target.value && target.nextElementSibling && target.nextElementSibling.tagName === 'INPUT') {
            target.nextElementSibling.focus();
        }
        setTimeout(checkProgress, 50);
    }

    window.handleKeyDown = function(e) {
        const target = e.target;
        if (e.key === 'Backspace' && !target.value && target.previousElementSibling && !target.previousElementSibling.disabled) {
            target.previousElementSibling.focus();
        }
        setTimeout(checkProgress, 50);
    }

    function checkProgress() {
        if(!currentQuiz) return;
        let completedCount = 0;

        currentQuiz.questions.forEach(q => {
            const inputs = document.querySelectorAll(`input[data-qno="${q.no}"]`);
            if(inputs.length === 0) return;
            
            const isComplete = Array.from(inputs).every(inp => inp.value.trim() !== '');
            const statusTd = document.getElementById(`status-${q.no}`);
            const rowTr = document.getElementById(`row-${q.no}`);
            const numTd = rowTr.querySelector('td:first-child');
            
            if(isComplete) {
                completedCount++;
                if(!statusTd.innerHTML.includes('check-circle')) {
                    // 完成一行的薄荷绿/马卡龙绿反馈
                    statusTd.innerHTML = '<div class="bg-emerald-100 rounded-full p-1 inline-block pop-anim"><i data-lucide="check-circle" class="w-6 h-6 text-emerald-500 mx-auto fill-current text-white"></i></div>';
                    rowTr.classList.add('bg-emerald-50/50'); 
                    numTd.classList.add('text-emerald-500');
                    numTd.classList.remove('text-gray-400');
                    lucide.createIcons();
                }
            } else {
                statusTd.innerHTML = '';
                rowTr.classList.remove('bg-emerald-50/50');
                numTd.classList.remove('text-emerald-500');
                numTd.classList.add('text-gray-400');
            }
        });
        
        const total = currentQuiz.questions.length;
        const progressPercent = (completedCount / total) * 100;
        document.getElementById('progressBar').style.width = `${progressPercent}%`;
        
        const badge = document.getElementById('progressBadge');
        document.getElementById('progressText').innerText = `${completedCount} / ${total} Completed`;
        
        if(completedCount === total) {
            badge.classList.remove('bg-pink-50', 'text-pink-500', 'border-pink-100');
            badge.classList.add('bg-emerald-100', 'text-emerald-600', 'border-emerald-300');
            badge.innerHTML = '<i data-lucide="award" class="w-5 h-5 mr-2 fill-current"></i><span id="progressText" class="text-base">All Completed!</span>';
            lucide.createIcons();
        } else {
            badge.classList.add('bg-pink-50', 'text-pink-500', 'border-pink-100');
            badge.classList.remove('bg-emerald-100', 'text-emerald-600', 'border-emerald-300');
        }
    }

    function submitQuiz() {
        currentQuiz.questions.forEach(q => {
            const inputs = document.querySelectorAll(`input[data-qno="${q.no}"]`);
            let answer = q.word[0];
            inputs.forEach(input => {
                answer += input.value.toLowerCase() || ' '; 
            });
            studentAnswers[q.no] = answer;
        });

        renderResults();
    }

    function renderResults() {
        const container = document.getElementById("app");
        let score = 0;
        let detailsHtml = '';

        currentQuiz.questions.forEach(q => {
            const isCorrect = studentAnswers[q.no] === q.word;
            if (isCorrect) score++;
            
            detailsHtml += `
                <div class="flex items-center justify-between p-5 mb-4 border-2 rounded-2xl ${isCorrect ? 'bg-emerald-50 border-emerald-200 shadow-sm' : 'bg-rose-50 border-rose-200 shadow-sm'}">
                    <div class="flex-1">
                        <div class="flex items-start">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold mr-3 mt-0.5 ${isCorrect ? 'bg-emerald-200 text-emerald-800' : 'bg-rose-200 text-rose-800'}">${q.no}</div>
                            <span class="text-gray-700 text-lg font-medium pt-1">${q.desc}</span>
                        </div>
                        <div class="mt-3 pl-11">
                            <span class="text-sm uppercase font-bold tracking-wider ${isCorrect ? 'text-emerald-600' : 'text-rose-500'}">Your Answer: </span>
                            <span class="font-bold text-xl tracking-widest ${isCorrect ? 'text-emerald-700' : 'text-rose-600'} bg-white px-3 py-1 rounded-lg shadow-inner ml-2">${studentAnswers[q.no]}</span>
                            
                            ${!isCorrect ? `
                            <div class="mt-3 border-t border-rose-200 pt-3">
                                <span class="text-sm text-emerald-600 uppercase font-bold tracking-wider">Correct Answer: </span>
                                <span class="font-bold text-xl tracking-widest text-emerald-600 bg-white px-3 py-1 rounded-lg shadow-inner ml-2">${q.word}</span>
                            </div>` : ''}
                        </div>
                    </div>
                    <div class="pl-6">
                        ${isCorrect ? `<div class="bg-emerald-100 p-3 rounded-full"><i data-lucide="check" class="w-8 h-8 text-emerald-500 stroke-[3]"></i></div>` 
                                    : `<div class="bg-rose-100 p-3 rounded-full"><i data-lucide="x" class="w-8 h-8 text-rose-500 stroke-[3]"></i></div>`}
                    </div>
                </div>
            `;
        });

        window.currentScore = score;
        const scorePercentage = (score / 5) * 100;
        
        // 马卡龙图表颜色
        let strokeColor = score >= 3 ? "text-emerald-400" : "text-amber-400";
        let bgColor = score >= 3 ? "bg-emerald-50" : "bg-amber-50";
        if (score === 5) { strokeColor = "text-pink-400"; bgColor = "bg-pink-50"; }

        container.innerHTML = `
            <div class="max-w-3xl w-full glass-card rounded-[2.5rem] p-8 md:p-12 transition-all">
                <div class="text-center mb-10">
                    <h2 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 mb-2">Fabulous Job!</h2>
                    <p class="text-xl text-gray-600 font-medium">You did it, <span class="font-bold text-pink-500 bg-pink-100 px-3 py-1 rounded-full">${studentName}</span> 🌟</p>
                    
                    <div class="relative w-48 h-48 mx-auto mt-8 mb-4">
                        <div class="absolute inset-0 rounded-full ${bgColor} scale-90 blur-xl opacity-60"></div>
                        <svg class="w-full h-full relative z-10" viewBox="0 0 36 36" style="--target-dash: ${scorePercentage};">
                            <!-- 底部灰色环 -->
                            <path class="text-gray-100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="100, 100" />
                            <!-- 动态彩色进度环 -->
                            <path class="${strokeColor} circular-chart-path drop-shadow-md" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3.5" stroke-dasharray="0, 100" />
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center pop-anim z-20" style="animation-delay: 1.5s;">
                            <span class="text-6xl font-black ${strokeColor.replace('text-', 'text-')} drop-shadow-sm">${score}</span>
                            <span class="text-sm font-bold text-gray-400 uppercase mt-1 tracking-widest">out of 5</span>
                        </div>
                    </div>
                </div>

                <div class="mb-10">
                    ${detailsHtml}
                </div>

                <div class="flex flex-wrap justify-center gap-4 bg-white/50 p-6 rounded-3xl border border-white">
                    <button onclick="downloadExcel()" class="flex items-center px-6 py-4 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 border-2 border-emerald-200 font-bold rounded-2xl transition-all transform hover:-translate-y-1">
                        <i data-lucide="file-spreadsheet" class="w-5 h-5 mr-2"></i> Save Excel
                    </button>
                    <button onclick="submitToTeacher()" id="submitBtn" class="flex items-center px-8 py-4 bg-gradient-to-r from-blue-400 to-indigo-400 hover:from-blue-500 hover:to-indigo-500 text-white shadow-lg shadow-blue-200 font-bold rounded-2xl transition-all transform hover:-translate-y-1">
                        <i data-lucide="send" class="w-5 h-5 mr-2"></i> Send Score
                    </button>
                    <button onclick="renderMainMenu()" class="flex items-center px-6 py-4 bg-gray-100 hover:bg-pink-100 hover:text-pink-600 border-2 border-transparent hover:border-pink-200 text-gray-600 font-bold rounded-2xl transition-all">
                        <i data-lucide="home" class="w-5 h-5 mr-2"></i> Play Again
                    </button>
                </div>
                <div id="statusContainer" class="mt-4 hidden p-4 rounded-2xl border-2 text-center font-bold text-lg shadow-sm"></div>
            </div>
        `;
        lucide.createIcons();
        triggerConfetti(score);
    }

    function triggerConfetti(score) {
        if (score === 5) {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            // 使用马卡龙色系的彩纸
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0, colors: ['#f472b6', '#a78bfa', '#60a5fa', '#34d399', '#fcd34d'] };
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        } else if (score >= 3) {
            confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors: ['#f472b6', '#a78bfa', '#60a5fa'] });
        }
    }
    function randomInRange(min, max) { return Math.random() * (max - min) + min; }

    function downloadExcel() {
        const ws_data = [
            ["Student Name", "Quiz Title", "Score", "Total"],
            [studentName, currentQuiz.title, window.currentScore, 5],
            [],
            ["Question No.", "Description", "Student Answer", "Correct Answer", "Status"]
        ];

        currentQuiz.questions.forEach(q => {
            const isCorrect = studentAnswers[q.no] === q.word;
            ws_data.push([
                q.no,
                q.desc,
                studentAnswers[q.no].toUpperCase(),
                q.word.toUpperCase(),
                isCorrect ? "Correct" : "Incorrect"
            ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Quiz Results");
        XLSX.writeFile(wb, `${studentName}_Part5_Results.xlsx`);
    }

    function submitToTeacher() {
        const btn = document.getElementById('submitBtn');
        const statusContainer = document.getElementById('statusContainer');
        statusContainer.classList.remove('hidden');
        
        if(GAS_URL === "替换成你的_WEB_APP_URL" || !GAS_URL) {
            statusContainer.innerHTML = "Oops! 老师还没有连接数据库哦 (Missing URL)";
            statusContainer.className = "mt-4 p-4 rounded-2xl border-2 border-rose-200 text-center font-bold block bg-rose-50 text-rose-500 shadow-sm";
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 mr-2 animate-spin"></i> Flying...`;
        lucide.createIcons();

        const payload = {
            timestamp: new Date().toLocaleString(),
            studentName: studentName,
            quizName: currentQuiz.title,
            score: window.currentScore,
            total: 5
        };

        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', 
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            btn.innerHTML = `<i data-lucide="check-circle-2" class="w-5 h-5 mr-2"></i> Sent!`;
            btn.className = "flex items-center px-8 py-4 bg-emerald-400 text-white shadow-lg shadow-emerald-200 font-bold rounded-2xl cursor-default";
            
            statusContainer.innerHTML = "✨ Score delivered successfully! ✨";
            statusContainer.className = "mt-5 p-4 rounded-2xl border-2 border-emerald-200 text-center font-bold block bg-emerald-50 text-emerald-600 shadow-sm animate-pulse";
            lucide.createIcons();
        })
        .catch(error => {
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="rotate-ccw" class="w-5 h-5 mr-2"></i> Try Again`;
            statusContainer.innerHTML = "Failed to send. Please check your internet connection.";
            statusContainer.className = "mt-5 p-4 rounded-2xl border-2 border-rose-200 text-center font-bold block bg-rose-50 text-rose-500 shadow-sm";
            lucide.createIcons();
        });
    }

</script>
<div id="app" class="w-full flex justify-center items-center flex-col min-h-[80vh] py-8 relative z-10"></div>
</body>
</html>
